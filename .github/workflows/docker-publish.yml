name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
    paths:
      - 'src/**'
      - 'main.py'
      - 'Dockerfile'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            USE_CHINA_MIRROR=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clean up old Docker images (keep latest 3)
        if: github.event_name != 'pull_request'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Cleaning up old tags for: $IMAGE"

          # Get all tags from Docker Hub (excluding latest)
          RESPONSE=$(curl -s -w "\n%{http_code}" -u "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
            "https://hub.docker.com/v2/repositories/$IMAGE/tags?page_size=100")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to get tags, HTTP: $HTTP_CODE, Response: $BODY"
            exit 0
          fi

          TAGS=$(echo "$BODY" | jq -r '.results // [] | .[] | select(.name != "latest") | .name' 2>/dev/null || echo "")

          if [ -z "$TAGS" ]; then
            echo "No tags found to clean up"
            exit 0
          fi

          # Count total tags
          TAG_COUNT=$(echo "$TAGS" | wc -l)
          echo "Found $TAG_COUNT tags (excluding latest)"

          if [ "$TAG_COUNT" -gt 3 ]; then
            # Keep only the 3 most recent (by name, assuming date-based tags)
            TO_DELETE=$(echo "$TAGS" | tail -n +4)
            for tag in $TO_DELETE; do
              echo "Deleting old tag: $tag"
              curl -s -X DELETE -u "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
                "https://hub.docker.com/v2/repositories/$IMAGE/tags/$tag/" || true
            done
          else
            echo "Only $TAG_COUNT tags found, no cleanup needed"
          fi

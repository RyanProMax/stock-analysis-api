name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
    paths:
      - 'src/**'
      - 'main.py'
      - 'Dockerfile'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            USE_CHINA_MIRROR=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clean up old Docker images (keep latest 3)
        if: github.event_name != 'pull_request'
        run: |
          # Get all tags from Docker Hub (excluding latest)
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAGS=$(curl -s -u "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
            "https://hub.docker.com/v2/repositories/$IMAGE/tags?page_size=100" | \
            jq -r '.results[] | select(.name != "latest") | .name')

          # Count total tags
          TAG_COUNT=$(echo "$TAGS" | wc -l)

          if [ "$TAG_COUNT" -gt 3 ]; then
            # Keep only the 3 most recent (by name, assuming date-based tags)
            TO_DELETE=$(echo "$TAGS" | tail -n +4)
            for tag in $TO_DELETE; do
              echo "Deleting old tag: $tag"
              curl -s -X DELETE -u "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
                "https://hub.docker.com/v2/repositories/$IMAGE/tags/$tag/"
            done
          else
            echo "Only $TAG_COUNT tags found, no cleanup needed"
          fi
